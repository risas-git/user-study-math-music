<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Study - Select Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent-a: #0284c7;
      --accent-a-hover: #0369a1;
      --accent-b: #7c3aed;
      --accent-b-hover: #6b21a8;
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --text-main: #1e293b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .logo-container img {
      max-width: 320px;
      width: 80%;
      height: auto;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      sm-flex-direction: row;
      gap: 1.5rem;
      width: 100%;
      max-width: 480px;
    }

    @media (min-width: 480px) {
      .button-group {
        flex-direction: row;
      }
    }

    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem 2rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: #ffffff;
      border-radius: 12px;
      text-decoration: none;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.15), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    .btn-a {
      background-color: var(--accent-a);
    }

    .btn-a:hover {
      background-color: var(--accent-a-hover);
    }

    .btn-b {
      background-color: var(--accent-b);
    }

    .btn-b:hover {
      background-color: var(--accent-b-hover);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <img src="./Test A/static/Logo.png" alt="Study Logo" />
    </div>

    <div class="button-group">
      <a href="./Test A/index.html" class="btn btn-a" onclick="sessionStorage.setItem('testStartTime', Date.now()); sessionStorage.removeItem('testEndTime');">Test A</a>
      <a href="./Test B/index.html" class="btn btn-b" onclick="sessionStorage.setItem('testStartTime', Date.now()); sessionStorage.removeItem('testEndTime');">Test B</a>
    </div>
  </div>

</body>
</html>
