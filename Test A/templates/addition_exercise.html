<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="../static/css/styles.css">
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({tex2jax: {inlineMath: [['$','$'], ['\\(','\\)']]}});
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.9/MathJax.js?config=TeX-MML-AM_CHTML"></script>
  <title>Addition Exercise</title>
</head>
<body style="padding-top: 100px;">
  <div style="position: fixed; top: 0; width: 100%; z-index: 999;">
    <div style="text-align: center; margin-top: 1%; margin-bottom: 1%;" > 
      <img src="../static/Logo.png" width="30%" />
    </div>    
  </div>

  <div class="centered">  
    <div style="max-width: 100%;">
      <h2 class="headingtop_margen">Exercises for Arithmetic (Adaptive Mode)</h2>
    </div>
    <div class="exercise-box">
      <div class="timer" id="timer" >
        <p>00:00:00</p>
      </div>
      <h4>Addition</h4>

      <form id="exerciseForm">
        <div id="Q1">
          <p class="line-spcaing">Q1: 1563 + 428 = </p>
          <input type="radio" id="add1" name="q1" value="1991">
          <label for="add1">1991</label><br>
          <input type="radio" id="add2" name="q1" value="2001">
          <label for="add2">2001</label><br>
          <input type="radio" id="add3" name="q1" value="1999">
          <label for="add3">1999</label><br>
          <p style="font-size: 14px; margin-top: 6px;" id="resultMessage_q1"></p>
          <button onclick="checkAnswer('q1', '1991')" class="button gray" type="button">Check & Submit</button>
          <button type="button" id="submitButton1" onclick="showNextQuestionDiv('Q2', 'Q1')" class="button gray">Next Question</button>
        </div>

        <div id="Q2" style="display: none;" >
          <p class="line-spcaing">Q2: 30951 + 67831 = </p>
          <input type="radio" id="add4" name="q2" value="98892">
          <label for="add4">98892</label><br>
          <input type="radio" id="add5" name="q2" value="97892">
          <label for="add5">97892</label><br>
          <input type="radio" id="add6" name="q2" value="98782">
          <label for="add6">98782</label><br>
          <p style="font-size: 14px; margin-top: 6px;" id="resultMessage_q2"></p>
          <button onclick="checkAnswer('q2', '98782')" class="button gray" type="button">Check & Submit</button>
          <button type="button" id="submitButton2" onclick="showNextQuestionDiv('Q3', 'Q2')" class="button gray">Next Question</button>
        </div>

        <div id="Q3" style="display: none;">
          <p class="line-spcaing">Q3: 13 + 14786 + 74411 = </p>
          <input type="radio" id="add7" name="q3" value="90090">
          <label for="add7">90090</label><br>
          <input type="radio" id="add8" name="q3" value="89210">
          <label for="add8">89210</label><br>
          <input type="radio" id="add9" name="q3" value="89190">
          <label for="add9">89190</label><br>
          <p style="font-size: 14px; margin-top: 6px;" id="resultMessage_q3"></p>
        
          <button type="button" id="submitButton3" onclick="checkAnswer('q3', '89210')" class="button gray">Check & Submit</button>
          <button type="button" id="submitButton" onclick="checkAnswers(false)" class="button gray">Result</button>
          <br>
          <button type="button" id="exampleButton" disabled onclick="openPage('add_example.html')" class="button gray">Example</button>
          <button class="button gray" type="button" id="nextButton" onclick="openPage('subtraction_exercise.html')" disabled>Next Exercise</button>
        </div>
      </form>
    </div>
    <div style="text-align: center; margin-top: 10px;"> 
      <p style="font-size:0.85em; color: #475569;">💡 Adaptive ITS: Incorrect answers unlock targeted misconception feedback.</p>
    </div>
  </div>

  <dialog id="resultDialog">
    <p id="resultMessage"></p>
    <button id="closeButton">Close</button>
  </dialog>

  <script src="../static/script.js?v=adaptive1"></script>
</body>
</html>
