<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Test 2 Completed</title>
  <style>
    :root {
      --accent-b: #7c3aed;
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .page-container {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
    }
    .main-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
      border: 1px solid #cbd5e1;
      text-align: center;
    }
    .time-box {
      background: #f3e8ff;
      border: 2px solid #7c3aed;
      border-radius: 12px;
      padding: 1rem;
      margin: 1.25rem 0;
    }
    .time-display {
      font-size: 2.5rem;
      color: #7c3aed;
      font-family: monospace;
      font-weight: 700;
    }
    .paas-card {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin: 1.5rem 0;
      text-align: left;
    }
    .paas-card h3 {
      font-size: 1.15rem;
      color: #0f172a;
      margin-bottom: 0.4rem;
      text-align: center;
    }
    .paas-prompt {
      font-size: 0.975rem;
      font-style: italic;
      color: #334155;
      margin-bottom: 1.25rem;
      text-align: center;
    }
    .paas-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .paas-item {
      display: flex;
      align-items: center;
      padding: 0.65rem 0.85rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .paas-item:hover {
      background: #f1f5f9;
      border-color: #7c3aed;
    }
    .paas-item input[type="radio"] {
      margin-right: 0.75rem;
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #7c3aed;
    }
    .paas-item label {
      font-size: 0.95rem;
      color: #1e293b;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
    }
    .btn-finish-study {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1.1rem 2.25rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffffff;
      background-color: #16a34a;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      transition: all 0.2s;
    }
    .btn-finish-study:hover {
      background-color: #15803d;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="page-container">  
    <div class="main-card">
      <h2 style="font-size: 1.6rem; color: #1e293b; margin-bottom: 0.5rem;">🎉 Test 2 Completed!</h2>
      <p style="font-size: 1.05rem; color: #475569;">
        You have successfully completed the second test section.
      </p>

      <!-- Time Taken for Test 2 (ABOVE Scale) -->
      <div class="time-box">
        <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 0.25rem;">Time Taken for Test 2:</p>
        <div id="test2Time" class="time-display">00:00:00</div>
      </div>

      <!-- Subjective Mental Effort Scale (Test 2) -->
      <div class="paas-card">
        <h3>Subjective Mental Effort Scale (Test 2)</h3>
        <p class="paas-prompt">In solving or studying the preceding problem I invested:</p>
        
        <div class="paas-list">
          <div class="paas-item"><input type="radio" name="paas2" id="p2_1" value="1. very, very low mental effort"><label for="p2_1">1. very, very low mental effort</label></div>
          <div class="paas-item"><input type="radio" name="paas2" id="p2_2" value="2. very low mental effort"><label for="p2_2">2. very low mental effort</label></div>
          <div class="paas-item"><input type="radio" name="paas2" id="p2_3" value="3. low mental effort"><label for="p2_3">3. low mental effort</label></div>
          <div class="paas-item"><input type="radio" name="paas2" id="p2_4" value="4. rather low mental effort"><label for="p2_4">4. rather low mental effort</label></div>
          <div class="paas-item"><input type="radio" name="paas2" id="p2_5" value="5. neither low nor high mental effort" checked><label for="p2_5">5. neither low nor high mental effort</label></div>
          <div class="paas-item"><input type="radio" name="paas2" id="p2_6" value="6. rather high mental effort"><label for="p2_6">6. rather high mental effort</label></div>
          <div class="paas-item"><input type="radio" name="paas2" id="p2_7" value="7. high mental effort"><label for="p2_7">7. high mental effort</label></div>
          <div class="paas-item"><input type="radio" name="paas2" id="p2_8" value="8. very high mental effort"><label for="p2_8">8. very high mental effort</label></div>
          <div class="paas-item"><input type="radio" name="paas2" id="p2_9" value="9. very, very high mental effort"><label for="p2_9">9. very, very high mental effort</label></div>
        </div>
      </div>

      <div style="margin-top: 1.5rem;">
        <button onclick="finishStudy()" class="btn-finish-study">Finish the Study →</button>
      </div>
    </div>
  </div>

  <script src="../static/script.js"></script>
  <script>
    (function() {
      // Calculate Test B time
      let bStart = parseInt(sessionStorage.getItem('testBStartTime'), 10);
      let bEnd = parseInt(sessionStorage.getItem('testBEndTime'), 10);
      
      if (!bEnd || isNaN(bEnd)) {
        bEnd = Date.now();
        sessionStorage.setItem('testBEndTime', bEnd);
      }

      let formattedBTime = "00:00:00";
      if (bStart && !isNaN(bStart)) {
        const elapsedTime = bEnd - bStart;
        const hours = Math.floor(elapsedTime / 3600000);
        const minutes = Math.floor((elapsedTime % 3600000) / 60000);
        const seconds = Math.floor((elapsedTime % 60000) / 1000);

        formattedBTime = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        document.getElementById('test2Time').textContent = formattedBTime;
      }
      sessionStorage.setItem('test2TimeFormatted', formattedBTime);
    })();

    function finishStudy() {
      const selectedPaas = document.querySelector('input[name="paas2"]:checked');
      if (selectedPaas) {
        sessionStorage.setItem('paasScale_Test2', selectedPaas.value);
      } else {
        sessionStorage.setItem('paasScale_Test2', '5. neither low nor high mental effort');
      }

      window.location.href = '../../summary.html';
    }
  </script>
</body>
</html>
